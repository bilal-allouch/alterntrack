<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une candidature · AlternTrack</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="app-header">
        <a href="{{ url_for('index') }}" class="brand-title">Altern<span>Track</span></a>
        <a href="{{ url_for('logout') }}" class="btn-logout">
            <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
        </a>
    </header>

    <div class="container-app">
        <a href="{{ url_for('index') }}" class="back-link">
            <i class="bi bi-arrow-left me-1"></i>Retour au tableau de bord
        </a>
        <h2 class="page-title mt-2">Ajouter une candidature</h2>

        <div class="card-section">
            <div class="mb-3">
                <label for="texte" class="form-label">Décrivez votre candidature</label>
                <textarea
                    id="texte"
                    class="form-control"
                    placeholder="Ex : J'ai postulé chez Capgemini pour un poste de développeur web en alternance à Lyon le 3 juin 2026..."></textarea>
            </div>

            <div class="mb-3">
                <label for="lien_source" class="form-label">Lien de l'offre (optionnel)</label>
                <input
                    type="url"
                    id="lien_source"
                    class="form-control"
                    placeholder="https://...">
            </div>

            <button type="button" id="btn-analyser" class="btn-analyser">
                <i class="bi bi-stars me-1"></i>Analyser
            </button>

            <div id="loader" class="loader">
                <div class="spinner"></div>
                <span>Analyse en cours...</span>
            </div>

            <div id="error-box" class="error-box"></div>
        </div>

        <div id="confirm-section" class="card-section confirm-section">
            <div class="section-heading">
                <i class="bi bi-check-circle-fill me-1"></i>Vérifiez et enregistrez
            </div>

            <form id="form-confirmer" method="POST" action="{{ url_for('confirmer') }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="entreprise" class="form-label">Entreprise</label>
                        <input type="text" id="entreprise" name="entreprise" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label for="poste" class="form-label">Poste</label>
                        <input type="text" id="poste" name="poste" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label for="type_contrat" class="form-label">Type de contrat</label>
                        <select id="type_contrat" name="type_contrat" class="form-select">
                            <option value="Alternance">Alternance</option>
                            <option value="Stage">Stage</option>
                            <option value="CDI">CDI</option>
                            <option value="CDD">CDD</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="localisation" class="form-label">Localisation</label>
                        <input type="text" id="localisation" name="localisation" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label for="date_candidature" class="form-label">Date de candidature</label>
                        <input type="text" id="date_candidature" name="date_candidature" class="form-control" placeholder="JJ/MM/AAAA">
                    </div>
                    <div class="col-md-6">
                        <label for="statut" class="form-label">Statut</label>
                        <select id="statut" name="statut" class="form-select">
                            {% for statut in statuts %}
                                <option value="{{ statut }}">{{ statut }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="source" class="form-label">Source de l'offre</label>
                        <select id="source" name="source" class="form-select">
                            <option value="LinkedIn">LinkedIn</option>
                            <option value="HelloWork">HelloWork</option>
                            <option value="Welcome to the Jungle">Welcome to the Jungle</option>
                            <option value="Indeed">Indeed</option>
                            <option value="Google">Google</option>
                            <option value="APEC">APEC</option>
                            <option value="Pôle Emploi">Pôle Emploi</option>
                            <option value="Site de l'entreprise">Site de l'entreprise</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>
                    <div class="col-md-6" id="source-autre-wrap" style="display: none;">
                        <label for="source_autre" class="form-label">Préciser la source</label>
                        <input type="text" id="source_autre" name="source_autre" class="form-control" placeholder="Ex : Salon, cooptation...">
                    </div>
                    <div class="col-12">
                        <label for="lien_offre" class="form-label">Lien de l'offre (optionnel)</label>
                        <input type="url" id="lien_offre" name="lien_offre" class="form-control">
                    </div>
                    <div class="col-12">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea id="notes" name="notes" class="form-control" style="min-height: 90px;"></textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn-confirmer">
                            <i class="bi bi-check-lg me-1"></i>Confirmer et enregistrer
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const btn = document.getElementById("btn-analyser");
        const loader = document.getElementById("loader");
        const errorBox = document.getElementById("error-box");
        const confirmSection = document.getElementById("confirm-section");

        function isoVersFr(valeur) {
            if (!valeur) {
                return "";
            }
            const m = valeur.match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!m) {
                return valeur;
            }
            return m[3] + "/" + m[2] + "/" + m[1];
        }

        function normaliserDateFr(valeur) {
            valeur = valeur.trim();
            if (!valeur) {
                return "";
            }
            const parts = valeur.split(/[\s/.\-]+/).filter(Boolean);
            if (parts.length !== 3) {
                return valeur;
            }
            const [jour, mois, annee] = parts;
            if (!/^\d{1,2}$/.test(jour) || !/^\d{1,2}$/.test(mois) || !/^\d{4}$/.test(annee)) {
                return valeur;
            }
            return jour.padStart(2, "0") + "/" + mois.padStart(2, "0") + "/" + annee;
        }

        function setSelectValue(select, value) {
            if (!value) {
                return;
            }
            let trouve = false;
            for (const option of select.options) {
                if (option.value === value) {
                    trouve = true;
                    break;
                }
            }
            if (!trouve) {
                const opt = document.createElement("option");
                opt.value = value;
                opt.textContent = value;
                select.appendChild(opt);
            }
            select.value = value;
        }

        async function analyser() {
            const texte = document.getElementById("texte").value.trim();
            const lienSource = document.getElementById("lien_source").value.trim();

            errorBox.classList.remove("show");
            errorBox.textContent = "";

            if (!texte) {
                errorBox.textContent = "Veuillez décrire votre candidature avant d'analyser.";
                errorBox.classList.add("show");
                return;
            }

            btn.disabled = true;
            loader.classList.add("show");
            confirmSection.classList.remove("show");

            try {
                const formData = new FormData();
                formData.append("texte", texte);

                const reponse = await fetch("{{ url_for('ajouter_post') }}", {
                    method: "POST",
                    body: formData
                });

                const data = await reponse.json();

                if (!reponse.ok || data.erreur) {
                    throw new Error(data.erreur || "L'analyse a échoué. Réessayez.");
                }

                document.getElementById("entreprise").value = data.entreprise || "";
                document.getElementById("poste").value = data.poste || "";
                document.getElementById("localisation").value = data.localisation || "";
                document.getElementById("date_candidature").value = isoVersFr(data.date_candidature);
                document.getElementById("notes").value = data.notes || "";
                document.getElementById("lien_offre").value = lienSource || data.lien_offre || "";

                setSelectValue(document.getElementById("type_contrat"), data.type_contrat);
                setSelectValue(document.getElementById("statut"), data.statut || "En attente");
                setSelectValue(document.getElementById("source"), data.source || "Autre");
                majAffichageSourceAutre();

                confirmSection.classList.add("show");
                confirmSection.scrollIntoView({ behavior: "smooth" });
            } catch (erreur) {
                errorBox.textContent = erreur.message;
                errorBox.classList.add("show");
            } finally {
                loader.classList.remove("show");
                btn.disabled = false;
            }
        }

        btn.addEventListener("click", analyser);

        const champDate = document.getElementById("date_candidature");
        champDate.addEventListener("blur", function () {
            champDate.value = normaliserDateFr(champDate.value);
        });

        const selectSource = document.getElementById("source");
        const sourceAutreWrap = document.getElementById("source-autre-wrap");
        const champSourceAutre = document.getElementById("source_autre");
        const formConfirmer = document.getElementById("form-confirmer");

        function majAffichageSourceAutre() {
            sourceAutreWrap.style.display = selectSource.value === "Autre" ? "block" : "none";
        }

        selectSource.addEventListener("change", majAffichageSourceAutre);

        formConfirmer.addEventListener("submit", function () {
            if (selectSource.value === "Autre") {
                const precision = champSourceAutre.value.trim();
                if (precision) {
                    setSelectValue(selectSource, precision);
                }
            }
        });
    </script>
    <div id="page-progress" style="position: fixed; top: 0; left: 0; width: 0%; height: 4px; background-color: #F5C518; z-index: 2000; transition: width 0.3s ease;"></div>
    <script>
        (function () {
            const barre = document.getElementById("page-progress");

            function demarrer() {
                barre.style.width = "0%";
                void barre.offsetWidth;
                barre.style.width = "80%";
            }

            function terminer() {
                barre.style.width = "100%";
                setTimeout(function () {
                    barre.style.width = "0%";
                }, 250);
            }

            document.addEventListener("click", function (e) {
                const lien = e.target.closest("a[href]");
                if (lien && lien.target !== "_blank" && !lien.getAttribute("href").startsWith("#")) {
                    demarrer();
                }
            });

            document.addEventListener("submit", function () {
                demarrer();
            });

            window.addEventListener("pageshow", terminer);
        })();
    </script>
</body>
</html>
