<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion · AlternTrack</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">
    <style>
        :root {
            --blanc: #FFFFFF;
            --jaune: #F5C518;
            --texte: #1E293B;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-color: #F8FAFC;
            color: var(--texte);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background-color: var(--blanc);
            border-radius: 1.25rem;
            box-shadow: 0 20px 45px rgba(30, 41, 59, 0.12);
            padding: 2.5rem 2rem;
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 1rem;
            background-color: var(--jaune);
            color: var(--texte);
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .brand-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0;
            color: var(--texte);
        }

        .brand-title span {
            color: var(--jaune);
        }

        .brand-subtitle {
            margin: 0.35rem 0 0;
            font-size: 0.9rem;
            color: #64748B;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--texte);
        }

        .input-group-text {
            background-color: var(--blanc);
            color: var(--jaune);
            border-right: none;
        }

        .form-control {
            border-left: none;
            color: var(--texte);
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--jaune);
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--jaune);
        }

        .btn-login {
            background-color: var(--jaune);
            color: var(--texte);
            font-weight: 700;
            border: none;
            border-radius: 0.65rem;
            padding: 0.7rem;
            width: 100%;
            transition: filter 0.15s ease;
        }

        .btn-login:hover {
            filter: brightness(0.95);
            color: var(--texte);
        }

        .alert-error {
            background-color: #FEF2F2;
            color: #B91C1C;
            border: 1px solid #FCA5A5;
            border-radius: 0.65rem;
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            animation: fadeIn 0.25s ease;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="brand-logo">
                <i class="bi bi-briefcase-fill"></i>
            </div>
            <h1 class="brand-title">Altern<span>Track</span></h1>
            <p class="brand-subtitle">Suivi de vos candidatures en alternance</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-error">
                        <i class="bi bi-exclamation-circle-fill me-1"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login_post') }}">
            <div class="mb-3">
                <label for="username" class="form-label">Identifiant</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person-fill"></i>
                    </span>
                    <input
                        type="text"
                        class="form-control"
                        id="username"
                        name="username"
                        placeholder="Votre identifiant"
                        required
                        autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        placeholder="Votre mot de passe"
                        required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-1"></i>
                Se connecter
            </button>
        </form>
    </div>
    <div id="page-progress" style="position: fixed; top: 0; left: 0; width: 0%; height: 4px; background-color: #F5C518; z-index: 2000; transition: width 0.3s ease;"></div>
    <script>
        (function () {
            const barre = document.getElementById("page-progress");

            function demarrer() {
                barre.style.width = "0%";
                void barre.offsetWidth;
                barre.style.width = "80%";
            }

            function terminer() {
                barre.style.width = "100%";
                setTimeout(function () {
                    barre.style.width = "0%";
                }, 250);
            }

            document.addEventListener("click", function (e) {
                const lien = e.target.closest("a[href]");
                if (lien && lien.target !== "_blank" && !lien.getAttribute("href").startsWith("#")) {
                    demarrer();
                }
            });

            document.addEventListener("submit", function () {
                demarrer();
            });

            window.addEventListener("pageshow", terminer);
        })();
    </script>
</body>
</html>
